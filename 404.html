<!-- GitHub Pages clean URL redirect:
     When GitHub serves this file for /services, /cases, etc.
     (extensionless paths), we redirect to the real .html file.
     If the URL already has an extension — fall through to 404 design. -->
<script>
(function(){
  var path   = window.location.pathname;
  var search = window.location.search;
  var hash   = window.location.hash;
  if (!path.match(/\.[a-zA-Z0-9]+$/)) {
    var clean = path.replace(/\/$/, '');
    if (clean === '' || clean === '/') {
      window.location.replace('/' + search + hash);
    } else {
      window.location.replace(clean + '.html' + search + hash);
    }
  }
})();
</script>

<style>
  /* ── 404 layout ── */
  .err-wrap {
    min-height: 100svh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 160px var(--gutter) 80px;
    position: relative;
    z-index: 2;
  }
  .err-inner {
    max-width: 780px;
    width: 100%;
    text-align: center;
  }

  /* coord strip */
  .err-coord {
    display: flex;
    justify-content: center;
    gap: 24px;
    font-family: var(--font-m);
    font-size: 10px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 40px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--rule);
  }
  .err-coord b { color: var(--ink); font-weight: 500; }
  .err-coord .sig { color: var(--acc); }

  /* hero: 4 · Михалыч · 4 */
  .err-hero {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    margin-bottom: 28px;
    position: relative;
  }
  .err-glow {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 680px; height: 360px;
    background: radial-gradient(ellipse at center,
      rgba(255,59,71,.13) 0%, transparent 65%);
    pointer-events: none;
    z-index: -1;
    filter: blur(32px);
  }
  .err-four {
    font-family: var(--font-d);
    font-size: clamp(120px, 22vw, 260px);
    font-weight: 700;
    letter-spacing: -.05em;
    line-height: 1;
    color: var(--acc);
    text-shadow:
      0 0 50px rgba(255,59,71,.7),
      0 0 120px rgba(255,59,71,.35);
    flex-shrink: 0;
    user-select: none;
  }
  .err-mik {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    margin: 0 -8px;
  }
  .err-mik img {
    height: clamp(120px, 21vw, 250px);
    width: auto;
    filter:
      drop-shadow(0 0 28px rgba(255,59,71,.22))
      drop-shadow(0 12px 48px rgba(0,0,0,.7));
    display: block;
  }

  /* pulsing status dot */
  .err-pulse {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--acc);
    box-shadow: 0 0 14px var(--acc-glow);
    animation: pulse-online 2.4s ease-in-out infinite;
    margin-bottom: 24px;
  }

  /* subtitle */
  .err-title {
    font-family: var(--font-m);
    font-size: 12px;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: #16a34a;
    margin-bottom: 20px;
  }

  /* hairline divider */
  .err-divider {
    width: 40px; height: 1px;
    background: var(--rule-2);
    margin: 0 auto 20px;
  }

  /* description */
  .err-desc {
    font-family: var(--font-b);
    font-size: 16px;
    line-height: 1.65;
    color: var(--ink-2);
    max-width: 34ch;
    margin: 0 auto 40px;
  }

  /* mobile */
  @media (max-width: 768px) {
    .err-wrap { padding-top: 140px; }
    .err-coord { display: none; }
    .err-glow { display: none; }
    .err-four { font-size: clamp(80px, 20vw, 140px); }
    .err-mik img { height: clamp(80px, 19vw, 130px); }
  }
